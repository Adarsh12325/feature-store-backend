# pytest.ini — Feature Store Backend Test Configuration
# ============================================================================

[pytest]
# Test discovery roots
testpaths = tests

# asyncio_mode=auto: pytest-asyncio automatically treats every async test
# function and async fixture as an asyncio coroutine. This eliminates the
# need for @pytest.mark.asyncio decorators on individual test methods.
asyncio_mode = auto

# Verbosity and output formatting
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers — prevents "PytestUnknownMarkWarning" for custom decorators
markers =
    asyncio: mark a test as an asyncio coroutine
    slow: mark a test as slow-running (skipped in fast CI runs)
    integration: mark a test that requires a live service (Docker)

# Suppress deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:pydantic.*:
    ignore::DeprecationWarning:fakeredis.*:
    ignore::pytest.PytestUnraisableExceptionWarning:

